<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FlashbackKit — 画面収録 許可プライミング</title>
<style>
  :root {
    --sf: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro", "Hiragino Sans", system-ui, sans-serif;
    --round: "SF Pro Rounded", ui-rounded, -apple-system, "Hiragino Maru Gothic ProN", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, "Roboto Mono", monospace;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  * { -webkit-font-smoothing: antialiased; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="directions.jsx"></script>
<script type="text/babel" src="priming.jsx"></script>
<script type="text/babel" src="priming-boards.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const Q = window.DIRECTIONS[2]; // Quiet 確定

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="overview" title="概要 & 推奨" subtitle="OS の画面収録確認の前に出す橋渡し画面 — 5 論点への提案">
          <DCArtboard id="intro" label="概要・推奨" width={920} height={780}>
            <PrimeIntroBoard />
          </DCArtboard>
        </DCSection>

        <DCSection id="primary" title="プライミング画面（半モーダル・主案）" subtitle="dormant の上に重なる .sheet([.medium]) — ライト / ダーク">
          <DCArtboard id="sheet-l" label="ライト・半モーダル" width={286} height={600}>
            <PrimingPhone d={Q} scheme="light" format="sheet" variant="A" />
          </DCArtboard>
          <DCArtboard id="sheet-d" label="ダーク・半モーダル" width={286} height={600}>
            <PrimingPhone d={Q} scheme="dark" format="sheet" variant="A" />
          </DCArtboard>
          <DCArtboard id="sheet-2btn" label="2ボタン版（比較）" width={286} height={600}>
            <PrimingPhone d={Q} scheme="light" format="sheet" variant="A" buttons="double" />
          </DCArtboard>
          <DCArtboard id="sheet-steps" label="3ステップ図解あり版" width={286} height={600}>
            <PrimingPhone d={Q} scheme="light" format="sheet" variant="A" showSteps={true} />
          </DCArtboard>
        </DCSection>

        <DCSection id="formats" title="提示形式の比較" subtitle="①半モーダル（推奨） / ②フルスクリーン / ③ReportView 内の状態">
          <DCArtboard id="compare" label="形式比較" width={1080} height={880}>
            <FormatCompareBoard />
          </DCArtboard>
        </DCSection>

        <DCSection id="flow" title="フロー上の位置" subtitle="再試行パス：dormant → priming → OS確認 → justEnabled">
          <DCArtboard id="flow-board" label="フロー全体" width={1100} height={720}>
            <PrimeFlowBoard />
          </DCArtboard>
        </DCSection>

        <DCSection id="settings" title="設定への追加" subtitle="「アプリ起動時に権限を確認する」トグル — iOS 標準色 / ライト・ダーク">
          <DCArtboard id="set-l" label="ライト・既定（オフ）" width={286} height={600}>
            <SettingsTimingPhone d={Q} scheme="light" on={false} />
          </DCArtboard>
          <DCArtboard id="set-d" label="ダーク・既定（オフ）" width={286} height={600}>
            <SettingsTimingPhone d={Q} scheme="dark" on={false} />
          </DCArtboard>
          <DCArtboard id="set-on" label="オン（起動時に確認）" width={286} height={600}>
            <SettingsTimingPhone d={Q} scheme="light" on={true} />
          </DCArtboard>
        </DCSection>

        <DCSection id="copy" title="コピー案" subtitle="見出し / 本文 / ボタン — 3 バリエーション（不具合/バグ表現なし）">
          <DCArtboard id="copy-board" label="コピー 3 案" width={1040} height={780}>
            <CopyBoard />
          </DCArtboard>
        </DCSection>

        <DCSection id="spec" title="トークン・SF Symbols・README 追記" subtitle="実装ハンドオフ">
          <DCArtboard id="spec-board" label="仕様 & README 追記" width={1080} height={640}>
            <PrimeSpecBoard />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
